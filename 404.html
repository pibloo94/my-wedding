<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      var pathSegments = window.location.pathname.split('/').filter(function(x) { return x; });
      if (pathSegments.length > 1) {
        var repo = pathSegments[0];
        var path = '/' + pathSegments.slice(1).join('/');
        window.location = '/' + repo + '/#' + path;
      } else {
        window.location = '/my-wedding/' + '';
      }
    </script>
  </head>
</html>
