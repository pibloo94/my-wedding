<div class="gate-overlay" [class.hiding]="hiding()">
  <div class="gate-bg"></div>

  <!-- Floating petals -->
  <div class="petal petal-1">✦</div>
  <div class="petal petal-2">✦</div>
  <div class="petal petal-3">✦</div>
  <div class="petal petal-4">✦</div>
  <div class="petal petal-5">◇</div>

  <div class="gate-content">
    <!-- Monogram -->
    <div class="monogram fade-in-up" style="--delay:0s">P &amp; D</div>

    <!-- Envelope -->
    <div class="envelope-wrapper fade-in-up" [class.opening]="opening()" [class.error]="error()" style="--delay:0.15s">

      <!-- Envelope body -->
      <div class="envelope">

        <!-- Back flap (behind content) -->
        <div class="envelope-back"></div>

        <!-- Content card (revealed on open) -->
        <div class="envelope-card">
          <div class="card-inner">
            <p class="card-tagline">Pablo & Daniela</p>
            <p class="card-date">2027</p>
          </div>
        </div>

        <!-- Side folds -->
        <div class="envelope-fold fold-left"></div>
        <div class="envelope-fold fold-right"></div>
        <div class="envelope-fold fold-bottom"></div>

        <!-- Top flap (animates open) -->
        <div class="envelope-flap"></div>

        <!-- Wax seal (moved out of flap to avoid clipping) -->
        <div class="wax-seal">
          <span class="seal-monogram">P•D</span>
        </div>

      </div>
    </div>

    <!-- Subtitle -->
    <p class="gate-subtitle fade-in-up" style="--delay:0.3s">
      Introduce la contraseña para acceder a esta invitación
    </p>

    <!-- Password form -->
    <div class="gate-form fade-in-up" style="--delay:0.45s">
      <div class="input-wrapper" [class.shake]="error()">
        <input
          id="gate-password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="onInput($event)"
          (keydown)="onKeydown($event)"
          placeholder="Contraseña"
          autocomplete="off"
          [attr.disabled]="opening() ? true : null"
        />
        <button class="unlock-btn" (click)="submit()" [disabled]="opening()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
      </div>

      @if (error()) {
        <p class="error-hint">Contraseña incorrecta. Inténtalo de nuevo.</p>
      }
    </div>

  </div>
</div>
