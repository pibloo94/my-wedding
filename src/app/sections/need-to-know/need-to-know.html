<section id="detalles" class="section need-to-know-section">
  <div class="container">
    <div class="section-header" scrollAnimate animClass="fade-up">
      <span class="label-accent">Información Práctica</span>
      <h2>Lo Que Debes Saber</h2>
      <div class="ornament-divider">
        <div class="line"></div>
        <div class="diamond"></div>
        <div class="diamond-center">✦</div>
        <div class="diamond"></div>
        <div class="line right"></div>
      </div>
      <p class="subtitle">Todo lo que necesitas para disfrutar al máximo de nuestra celebración</p>
    </div>

    <div class="info-grid">
      @for (card of cards; track card.title; let i = $index) {
        <div class="info-card card" scrollAnimate animClass="fade-up" [animDelay]="(i % 3) * 100">
          <div class="info-icon-wrap" [style.background]="card.accent + '14'" [style.border-color]="card.accent + '30'">
            <span class="info-icon">{{ card.icon }}</span>
          </div>
          <h4 class="info-title" [style.color]="card.accent">{{ card.title }}</h4>
          <ul class="info-list">
            @for (item of card.items; track item) {
              <li>{{ item }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
