<section id="hero" class="hero">
  <div class="hero-content container">
    <div class="hero-tag fade-up" style="transition-delay: 0.1s">
      <span class="label-caps">Estáis invitados a la boda de</span>
    </div>

    <h1 class="hero-names fade-up" style="transition-delay: 0.3s">
      <span class="name">Daniela</span>
      <span class="ampersand-hero">&</span>
      <span class="name">Pablo</span>
    </h1>
    </div>

    <div class="hero-meta fade-up" style="transition-delay: 0.5s">
      <p class="hero-date">11.09.2027</p>
      <div class="meta-divider"></div>
      <p class="hero-location">Madrid</p>
    </div>

    <!-- Countdown -->
    @if (!expired()) {
      <div class="countdown fade-up" style="transition-delay: 0.7s">
        @for (unit of countdown(); track unit.label) {
          <div class="countdown-unit">
            <span class="countdown-value">{{ unit.value | number:'2.0-0' }}</span>
            <span class="countdown-label">{{ unit.label }}</span>
          </div>
        }
      </div>
    }

    <div class="hero-actions fade-up" style="transition-delay: 0.9s">
      <button class="btn btn-primary" (click)="scrollToRsvp()" id="btn-hero-rsvp">
        Confirmar Asistencia
      </button>
      <button class="btn btn-outline" (click)="scrollToEvents()" id="btn-hero-events">
        Detalles
      </button>
    </div>
  </div>

  <div class="scroll-indicator" (click)="scrollToEvents()">
    <span class="label-caps">Descubrir</span>
    <div class="scroll-line"></div>
  </div>
</section>
